name: CI Reproducer
description: Automatically analyzes CI failures, derives minimal reproducer commands, and generates diagnostic reports.

inputs:
  github-token:
    description: GitHub token for accessing logs via gh CLI
    required: true
  timeout-seconds:
    description: Maximum time (seconds) to run the reproducer
    required: false
    default: '900'
  failed-job-name:
    description: Name of the failed job (auto-detected if not provided)
    required: false
    default: ''

outputs:
  report:
    description: Markdown-formatted reproducer report
    value: ${{ steps.generate-report.outputs.report }}
  confidence:
    description: Confidence level of the reproducer (Low/Medium/High)
    value: ${{ steps.generate-report.outputs.confidence }}
  reproducer-command:
    description: The minimal reproducer command derived from logs
    value: ${{ steps.run-reproducer.outputs.reproducer-command }}

runs:
  using: composite
  steps:
    - id: setup
      shell: bash
      run: |
        set -e
        echo "=== CI Reproducer: Setup ===" >&2

        # Create temp directory for logs and artifacts
        export REPRO_TMP=$(mktemp -d /tmp/ci-reproducer-XXXXXX)
        trap "rm -rf '$REPRO_TMP'" EXIT

        # Export all variables to $GITHUB_ENV for following steps
        echo "REPRO_TMP=$REPRO_TMP" >> $GITHUB_ENV
        echo "GITHUB_TOKEN=${{ inputs.github-token }}" >> $GITHUB_ENV
        echo "TIMEOUT_SECONDS=${{ inputs.timeout-seconds }}" >> $GITHUB_ENV
        echo "FAILED_JOB_NAME=${{ inputs.failed-job-name }}" >> $GITHUB_ENV
        echo "RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
        echo "RUN_ATTEMPT=${{ github.run_attempt }}" >> $GITHUB_ENV
        echo "ACTOR=${{ github.actor }}" >> $GITHUB_ENV
        echo "REF=${{ github.ref }}" >> $GITHUB_ENV
        echo "GITHUB_REPOSITORY=${{ github.repository }}" >> $GITHUB_ENV

    - id: fetch-logs
      shell: bash
      run: ${{ github.action_path }}/parsers/log-fetcher.sh
      env:
        REPRO_TMP: ${{ env.REPRO_TMP }}
        RUN_ID: ${{ env.RUN_ID }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ env.GITHUB_REPOSITORY }}

    - id: parse-logs
      shell: bash
      run: ${{ github.action_path }}/parsers/system-tests.sh
      env:
        REPRO_TMP: ${{ env.REPRO_TMP }}
      continue-on-error: true

    - id: validate
      shell: bash
      run: ${{ github.action_path }}/parsers/validator.sh
      env:
        REPRO_TMP: ${{ env.REPRO_TMP }}
      continue-on-error: true

    - id: run-reproducer
      shell: bash
      run: ${{ github.action_path }}/parsers/run-reproducer.sh
      env:
        REPRO_TMP: ${{ env.REPRO_TMP }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      continue-on-error: true

    - id: generate-report
      shell: bash
      run: ${{ github.action_path }}/report.sh
      env:
        REPRO_TMP: ${{ env.REPRO_TMP }}
